<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamlar | Cumhuriyet Örnek Köy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('cok_theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);})()</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8fafc;--surface:#ffffff;--text:#0f172a;--text-sec:#64748b;
  --accent:#3b82f6;--accent-dark:#1d4ed8;--accent-light:#dbeafe;--accent-bg:#eff6ff;
  --border:#e2e8f0;
  --green:#10b981;--green-light:#d1fae5;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.05);--shadow-md:0 4px 20px rgba(0,0,0,0.07);
  --radius:12px;--radius-sm:8px;
}
[data-theme="dark"]{
  --bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--text-sec:#94a3b8;
  --accent:#60a5fa;--accent-dark:#3b82f6;--accent-light:#1e3a5f;--accent-bg:rgba(59,130,246,.1);
  --border:#334155;--green-light:rgba(16,185,129,.15);
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 20px rgba(0,0,0,.3);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:3px}
a{text-decoration:none;color:inherit}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 48px;background:var(--surface);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);box-shadow:0 1px 0 var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .4s}
.nav-brand{font-size:1rem;font-weight:700;color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-back{display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:500;color:var(--text-sec);transition:color .2s}
.nav-back:hover{color:var(--accent)}
.nav-back svg{width:18px;height:18px}
.theme-switch{position:relative;width:44px;height:24px;flex-shrink:0;cursor:pointer}
.theme-switch input{display:none}
.theme-slider{position:absolute;inset:0;background:var(--border);border:1px solid var(--border);border-radius:12px;transition:all .35s}
.theme-slider::before{content:'';position:absolute;left:2px;top:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:all .35s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.theme-switch input:checked+.theme-slider{background:var(--accent);border-color:var(--accent)}
.theme-switch input:checked+.theme-slider::before{transform:translateX(20px)}
.theme-switch-icons{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 5px;pointer-events:none}
.theme-switch-icons svg{width:12px;height:12px}
.ts-sun{color:#f59e0b;opacity:0;transition:opacity .3s}
.ts-moon{color:var(--text-sec);opacity:1;transition:opacity .3s}
[data-theme="dark"] .ts-sun{opacity:1}
[data-theme="dark"] .ts-moon{opacity:0}

/* HEADER */
.page-header{padding:120px 0 48px;max-width:700px;margin:0 auto;padding-left:48px;padding-right:48px}
.page-header h1{font-size:2.2rem;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.page-header p{font-size:.92rem;color:var(--text-sec);margin-top:8px;line-height:1.6}

/* FORM */
.form-area{max-width:700px;margin:0 auto;padding:0 48px 24px}
.selam-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:box-shadow .3s,background .4s,border-color .4s}
.selam-form:focus-within{box-shadow:var(--shadow-md);border-color:var(--accent)}
.selam-textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:.92rem;color:var(--text);resize:none;height:80px;line-height:1.7;outline:none}
.selam-textarea::placeholder{color:var(--text-sec)}
.selam-form-bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:14px;margin-top:12px;gap:12px;flex-wrap:wrap}
.selam-input{border:none;background:transparent;border-bottom:1.5px solid var(--border);font-family:inherit;font-size:.85rem;color:var(--text);padding:4px 0;outline:none;transition:border-color .3s}
.selam-input::placeholder{color:var(--text-sec)}
.selam-input:focus{border-bottom-color:var(--accent)}
.btn-send{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 22px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .3s}
.btn-send:hover{background:var(--accent-dark);transform:translateY(-1px)}
.selam-success{display:none;background:var(--green-light);color:#065f46;border-radius:var(--radius-sm);padding:12px 16px;font-size:.85rem;font-weight:500;margin-top:12px}
[data-theme="dark"] .selam-success{color:#6ee7b7}
.selam-success.show{display:block;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* GREETING LIST */
.list-area{max-width:700px;margin:0 auto;padding:32px 48px 80px}
.list-count{font-size:.75rem;color:var(--text-sec);margin-bottom:20px;font-weight:500}
.greeting-list{display:flex;flex-direction:column;gap:12px}
.greeting-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;transition:all .3s;animation:fadeIn .4s ease}
.greeting-card:hover{box-shadow:var(--shadow-md)}
.gc-header{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.gc-name{font-size:.85rem;font-weight:600;color:var(--text)}
.gc-city{font-size:.75rem;color:var(--accent);font-weight:500}
.gc-message{font-size:.9rem;line-height:1.7;color:var(--text-sec);font-weight:400}
.gc-time{font-size:.7rem;color:var(--text-sec);margin-top:10px;opacity:.6}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:32px}
.page-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-family:inherit;font-size:.82rem;font-weight:500;color:var(--text-sec);cursor:pointer;transition:all .2s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:default}

/* FOOTER */
footer{background:var(--surface);color:var(--text-sec);text-align:center;padding:32px 24px;font-size:.75rem;border-top:1px solid var(--border)}

@media(max-width:700px){
  nav{padding:14px 24px}
  .page-header,.form-area,.list-area{padding-left:24px;padding-right:24px}
}
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Ana Sayfa
  </a>
  <div class="nav-right">
    <label class="theme-switch" aria-label="Tema Değiştir">
      <input type="checkbox" id="themeCheck">
      <span class="theme-slider"></span>
      <span class="theme-switch-icons">
        <svg class="ts-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="ts-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </span>
    </label>
    <span class="nav-brand">Cumhuriyet Örnek Köy</span>
  </div>
</nav>

<div class="page-header">
  <h1>Selamlar</h1>
  <p>Köyümüzden uzakta olan herkesin bıraktığı selamlar, anılar ve güzel sözler. Sen de bir selam bırak.</p>
</div>

<div class="form-area">
  <div class="selam-form">
    <textarea class="selam-textarea" id="selamYazi" placeholder="Köye bir selam bırak, bir anını paylaş..."></textarea>
    <div class="selam-form-bottom">
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <input class="selam-input" style="width:180px" id="selamAd" type="text" placeholder="Adın Soyadın">
        <input class="selam-input" style="width:120px" id="selamSehir" type="text" placeholder="Şehir">
      </div>
      <button class="btn-send" onclick="submitGreeting()">Gönder</button>
    </div>
  </div>
  <div class="selam-success" id="selamSuccess">Selamın iletildi, teşekkürler!</div>
</div>

<div class="list-area">
  <div class="list-count" id="listCount"></div>
  <div class="greeting-list" id="greetingList"></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>Cumhuriyet Örnek Köy &middot; 2025</footer>

<script>
/* Theme toggle */
var themeCheck=document.getElementById('themeCheck');
themeCheck.checked=document.documentElement.getAttribute('data-theme')==='dark';
themeCheck.addEventListener('change',function(){
  var next=this.checked?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('cok_theme',next);
});

const DATA_KEY='cok_site';
function loadData(){try{return JSON.parse(localStorage.getItem(DATA_KEY));}catch(e){return null;}}
function saveData(d){localStorage.setItem(DATA_KEY,JSON.stringify(d));}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

let data=loadData();
if(!data){window.location.href='index.html';}

const months=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
function formatDate(ts){
  const d=new Date(ts);
  const pad=n=>String(n).padStart(2,'0');
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

const PER_PAGE=10;
let currentPage=1;

function getApproved(){
  return data.greetings.filter(g=>g.approved).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
}

function renderPage(){
  const approved=getApproved();
  const total=approved.length;
  const totalPages=Math.ceil(total/PER_PAGE)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  const start=(currentPage-1)*PER_PAGE;
  const pageItems=approved.slice(start,start+PER_PAGE);

  document.getElementById('listCount').textContent=`Toplam ${total} selam`;

  const list=document.getElementById('greetingList');
  list.innerHTML='';
  pageItems.forEach(g=>{
    const div=document.createElement('div');
    div.className='greeting-card';
    div.innerHTML=`<div class="gc-header"><span class="gc-name">${escapeHtml(g.name)}</span><span class="gc-city">${escapeHtml(g.city)}</span></div><div class="gc-message">${escapeHtml(g.message)}</div><div class="gc-time">${formatDate(g.timestamp)}</div>`;
    list.appendChild(div);
  });

  const pag=document.getElementById('pagination');
  pag.innerHTML='';
  if(totalPages>1){
    const prev=document.createElement('button');
    prev.className='page-btn';prev.textContent='Önceki';
    prev.disabled=currentPage===1;
    prev.onclick=()=>{currentPage--;renderPage();window.scrollTo({top:document.querySelector('.list-area').offsetTop-80,behavior:'smooth'});};
    pag.appendChild(prev);
    for(let i=1;i<=totalPages;i++){
      const btn=document.createElement('button');
      btn.className='page-btn'+(i===currentPage?' active':'');
      btn.textContent=i;
      btn.onclick=()=>{currentPage=i;renderPage();window.scrollTo({top:document.querySelector('.list-area').offsetTop-80,behavior:'smooth'});};
      pag.appendChild(btn);
    }
    const next=document.createElement('button');
    next.className='page-btn';next.textContent='Sonraki';
    next.disabled=currentPage===totalPages;
    next.onclick=()=>{currentPage++;renderPage();window.scrollTo({top:document.querySelector('.list-area').offsetTop-80,behavior:'smooth'});};
    pag.appendChild(next);
  }
}
renderPage();

function submitGreeting(){
  const msg=document.getElementById('selamYazi').value.trim();
  const name=document.getElementById('selamAd').value.trim();
  const city=document.getElementById('selamSehir').value.trim();
  if(!msg)return;
  const g={id:Date.now(),name:name||'Köylü',city:city||'Bilinmiyor',message:msg,timestamp:new Date().toISOString(),approved:true};
  data.greetings.unshift(g);
  saveData(data);
  currentPage=1;
  renderPage();
  document.getElementById('selamYazi').value='';
  document.getElementById('selamAd').value='';
  document.getElementById('selamSehir').value='';
  const s=document.getElementById('selamSuccess');
  s.classList.add('show');
  setTimeout(()=>s.classList.remove('show'),3000);
}
document.getElementById('selamYazi').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();submitGreeting();}});
</script>
</body>
</html>
