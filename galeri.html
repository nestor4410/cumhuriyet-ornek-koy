<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotoğraflar | Cumhuriyet Örnek Köy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('cok_theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);})()</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8fafc;--surface:#ffffff;--text:#0f172a;--text-sec:#64748b;
  --accent:#3b82f6;--accent-dark:#1d4ed8;--accent-light:#dbeafe;--accent-bg:#eff6ff;
  --border:#e2e8f0;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.05);--shadow-md:0 4px 20px rgba(0,0,0,0.07);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.1);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
}
[data-theme="dark"]{
  --bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--text-sec:#94a3b8;
  --accent:#60a5fa;--accent-dark:#3b82f6;--accent-light:#1e3a5f;--accent-bg:rgba(59,130,246,.1);
  --border:#334155;--dark-bg:#0f172a;--dark-text:#f1f5f9;--dark-sec:#94a3b8;
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 20px rgba(0,0,0,.3);
  --shadow-lg:0 12px 40px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:3px}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 48px;background:rgba(255,255,255,.88);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);box-shadow:0 1px 0 var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .4s}
[data-theme="dark"] nav{background:rgba(15,23,42,.92);box-shadow:0 1px 0 rgba(255,255,255,.06)}
.nav-brand{font-size:1rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-back{display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:500;color:var(--text-sec);transition:color .2s}
.nav-back:hover{color:var(--accent)}
.nav-back svg{width:18px;height:18px}
.theme-toggle{background:var(--accent-bg);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;padding:0;flex-shrink:0}
.theme-toggle:hover{transform:scale(1.1)}
.theme-toggle svg{width:16px;height:16px;color:var(--text-sec)}
.theme-toggle .t-sun{display:none}
.theme-toggle .t-moon{display:block}
[data-theme="dark"] .theme-toggle .t-sun{display:block}
[data-theme="dark"] .theme-toggle .t-moon{display:none}
[data-theme="dark"] .theme-toggle{background:rgba(59,130,246,.1);border-color:var(--border)}

/* HEADER */
.page-header{padding:120px 48px 48px;max-width:1200px;margin:0 auto}
.page-header h1{font-size:2.2rem;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.page-header p{font-size:.92rem;color:var(--text-sec);margin-top:8px}

/* GALLERY GRID */
.gallery{max-width:1200px;margin:0 auto;padding:0 48px 80px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.gallery-item{position:relative;aspect-ratio:4/3;border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s}
.gallery-item:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.gallery-item:hover img{transform:scale(1.05)}
.gi-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .5s}
.gallery-item:hover .gi-placeholder{transform:scale(1.05)}
.gi-label{font-size:.72rem;font-weight:500;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;text-align:center}
.gi-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,23,42,.75) 0%,transparent 50%);opacity:0;transition:opacity .35s;display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
.gallery-item:hover .gi-overlay{opacity:1}
.gi-title{font-size:.92rem;font-weight:600;color:#fff;margin-bottom:2px}
.gi-caption{font-size:.78rem;color:rgba(255,255,255,.7);font-weight:400}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:1000;background:rgba(15,23,42,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .35s}
.lightbox.open{opacity:1;visibility:visible}
.lb-content{max-width:90vw;max-height:85vh;position:relative;animation:lbIn .35s ease}
@keyframes lbIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.lb-image-wrap{position:relative;overflow:hidden;border-radius:var(--radius);cursor:grab;touch-action:none}
.lb-image-wrap.zoomed{cursor:move}
.lb-image{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:var(--radius);transition:transform .3s ease;transform-origin:center center;user-select:none;-webkit-user-drag:none}
.lb-placeholder{width:70vw;height:60vh;max-width:900px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.lb-placeholder span{font-size:.85rem;color:rgba(255,255,255,.3);letter-spacing:.1em}
.lb-info{text-align:center;margin-top:16px}
.lb-title{font-size:1rem;font-weight:600;color:var(--dark-text)}
.lb-caption{font-size:.85rem;color:var(--dark-sec);margin-top:4px}
.lb-counter{font-size:.72rem;color:rgba(148,163,184,.5);margin-top:6px}
.lb-toolbar{position:absolute;top:-48px;right:0;display:flex;align-items:center;gap:8px}
.lb-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-btn:hover{background:rgba(255,255,255,.25)}
.lb-btn svg{width:18px;height:18px}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-nav:hover{background:rgba(255,255,255,.2)}
.lb-prev{left:-64px}
.lb-next{right:-64px}

/* FULLSCREEN LIGHTBOX */
.lightbox.fullscreen{background:rgba(0,0,0,1)}
.lightbox.fullscreen .lb-image{max-width:100vw;max-height:100vh;border-radius:0}
.lightbox.fullscreen .lb-image-wrap{border-radius:0}
.lightbox.fullscreen .lb-info{display:none}
.lightbox.fullscreen .lb-toolbar{top:16px;right:16px}
.lightbox.fullscreen .lb-prev{left:16px}
.lightbox.fullscreen .lb-next{right:16px}

/* SUBMIT BUTTON */
.submit-photo-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 20px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .3s;text-decoration:none}
.submit-photo-btn:hover{background:var(--accent-dark);transform:translateY(-1px)}
.submit-photo-btn svg{width:14px;height:14px}

/* FOOTER */
footer{background:var(--surface);color:var(--text-sec);text-align:center;padding:32px 24px;font-size:.75rem;border-top:1px solid var(--border)}

@media(max-width:900px){
  nav{padding:14px 24px}
  .page-header{padding:100px 24px 32px}
  .gallery{padding:0 24px 60px}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
  .lb-prev{left:8px}.lb-next{right:8px}
}
@media(max-width:480px){
  .gallery-grid{grid-template-columns:1fr 1fr;gap:6px}
  .gallery-item{border-radius:var(--radius-sm)}
}
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Ana Sayfa
  </a>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Tema Değiştir">
      <svg class="t-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg class="t-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <span class="nav-brand">Cumhuriyet Örnek Köy</span>
  </div>
</nav>

<div class="page-header">
  <h1>Fotoğraflar</h1>
  <p>Köyümüzden kareler, anılar ve manzaralar.</p>
  <a href="#" class="submit-photo-btn" id="galSubmitPhoto" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Fotoğraf Gönder
  </a>
</div>

<div class="gallery">
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lb-content" id="lbContent">
    <div class="lb-toolbar">
      <button class="lb-btn" onclick="lbZoomIn()" title="Yakınlaştır"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
      <button class="lb-btn" onclick="lbZoomOut()" title="Uzaklaştır"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
      <button class="lb-btn" onclick="lbResetZoom()" title="Sıfırla">1:1</button>
      <button class="lb-btn" onclick="toggleFullscreen()" title="Tam Ekran"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
      <button class="lb-btn" onclick="closeLightbox()" title="Kapat">&times;</button>
    </div>
    <button class="lb-nav lb-prev" onclick="lbPrev()">&#8249;</button>
    <button class="lb-nav lb-next" onclick="lbNext()">&#8250;</button>
    <div class="lb-image-wrap" id="lbImageWrap">
      <div id="lbImageArea"></div>
    </div>
    <div class="lb-info">
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-caption" id="lbCaption"></div>
      <div class="lb-counter" id="lbCounter"></div>
    </div>
  </div>
</div>

<footer>Cumhuriyet Örnek Köy &middot; 2025</footer>

<script>
const DATA_KEY='cok_site';
function loadData(){try{return JSON.parse(localStorage.getItem(DATA_KEY));}catch(e){return null;}}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
const data=loadData();
if(!data){window.location.href='index.html';}
const photos=data?data.photos:[];
var galContent=data&&data.content?data.content:{};

/* Apply content from admin */
(function(){
  var sb=document.getElementById('galSubmitPhoto');
  if(galContent.btnSubmitPhoto) sb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> '+galContent.btnSubmitPhoto;
  if(galContent.googleFormsUrl){sb.href=galContent.googleFormsUrl;}
  else{sb.href='#';sb.addEventListener('click',function(e){e.preventDefault();alert('Fotoğraf gönderme linki henüz admin panelinden eklenmedi.');});}
})();

/* IndexedDB photo storage */
const DB_NAME='cok_photos',DB_VER=1,STORE_NAME='photos';
function openPhotoDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore(STORE_NAME);};
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function getPhotoBlob(name){
  return openPhotoDB().then(db=>{
    return new Promise((resolve,reject)=>{
      const tx=db.transaction(STORE_NAME,'readonly');
      const req=tx.objectStore(STORE_NAME).get(name);
      req.onsuccess=()=>resolve(req.result||null);
      req.onerror=e=>reject(e.target.error);
    });
  });
}
const _blobUrlCache={};
function resolvePhotoUrl(fileName){
  if(_blobUrlCache[fileName])return Promise.resolve(_blobUrlCache[fileName]);
  return getPhotoBlob(fileName).then(blob=>{
    if(!blob)return '';
    const url=URL.createObjectURL(blob instanceof Blob?blob:new Blob([blob]));
    _blobUrlCache[fileName]=url;
    return url;
  }).catch(()=>'');
}

const grid=document.getElementById('galleryGrid');
photos.forEach((p,i)=>{
  const div=document.createElement('div');
  div.className='gallery-item';
  div.onclick=()=>openLightbox(i);
  div.innerHTML=`<div class="gi-placeholder" style="background:${p.gradient||'linear-gradient(135deg,#1e3c72,#4facfe)'}"><span class="gi-label">${escapeHtml(p.title)}</span></div><div class="gi-overlay"><div class="gi-title">${escapeHtml(p.title)}</div><div class="gi-caption">${escapeHtml(p.caption)}</div></div>`;
  grid.appendChild(div);
  resolvePhoto(p,div);
});

function resolvePhoto(p,div){
  if(p.file){
    resolvePhotoUrl(p.file).then(url=>{
      if(url){
        const overlay=div.querySelector('.gi-overlay').outerHTML;
        div.innerHTML=`<img src="${url}" alt="${escapeHtml(p.title)}">`+overlay;
        div.dataset.resolvedSrc=url;
      }
    });
  }else if(p.src){
    const overlay=div.querySelector('.gi-overlay').outerHTML;
    div.innerHTML=`<img src="${escapeHtml(p.src)}" alt="${escapeHtml(p.title)}">`+overlay;
    div.dataset.resolvedSrc=p.src;
  }
}

let lbIndex=0;
let lbZoom=1;
let lbPanX=0,lbPanY=0,lbDragging=false,lbStartX=0,lbStartY=0;

function openLightbox(i){
  lbIndex=i;
  lbResetZoom();
  renderLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox').classList.remove('fullscreen');
  document.body.style.overflow='';
  lbResetZoom();
}
function lbPrev(){lbIndex=(lbIndex-1+photos.length)%photos.length;lbResetZoom();renderLb();}
function lbNext(){lbIndex=(lbIndex+1)%photos.length;lbResetZoom();renderLb();}

function lbZoomIn(){lbZoom=Math.min(lbZoom+0.5,5);applyZoom();}
function lbZoomOut(){lbZoom=Math.max(lbZoom-0.5,0.5);if(lbZoom<=1){lbPanX=0;lbPanY=0;}applyZoom();}
function lbResetZoom(){lbZoom=1;lbPanX=0;lbPanY=0;applyZoom();}
function applyZoom(){
  var img=document.querySelector('.lb-image');
  var wrap=document.getElementById('lbImageWrap');
  if(img){img.style.transform='scale('+lbZoom+') translate('+lbPanX+'px,'+lbPanY+'px)';}
  if(wrap){wrap.classList.toggle('zoomed',lbZoom>1);}
}

function toggleFullscreen(){
  document.getElementById('lightbox').classList.toggle('fullscreen');
}

function renderLb(){
  const p=photos[lbIndex];
  const area=document.getElementById('lbImageArea');
  const items=grid.querySelectorAll('.gallery-item');
  const resolvedSrc=items[lbIndex]?items[lbIndex].dataset.resolvedSrc:'';
  if(resolvedSrc){
    area.innerHTML='<img class="lb-image" src="'+resolvedSrc+'" alt="'+escapeHtml(p.title)+'" draggable="false">';
  }else if(p.file){
    area.innerHTML='<div class="lb-placeholder" style="background:'+(p.gradient||'linear-gradient(135deg,#1e3c72,#4facfe)')+'"><span>'+escapeHtml(p.title)+'</span></div>';
    resolvePhotoUrl(p.file).then(function(url){
      if(url)area.innerHTML='<img class="lb-image" src="'+url+'" alt="'+escapeHtml(p.title)+'" draggable="false">';
    });
  }else if(p.src){
    area.innerHTML='<img class="lb-image" src="'+escapeHtml(p.src)+'" alt="'+escapeHtml(p.title)+'" draggable="false">';
  }else{
    area.innerHTML='<div class="lb-placeholder" style="background:'+(p.gradient||'linear-gradient(135deg,#1e3c72,#4facfe)')+'"><span>'+escapeHtml(p.title)+'</span></div>';
  }
  document.getElementById('lbTitle').textContent=p.title;
  document.getElementById('lbCaption').textContent=p.caption;
  document.getElementById('lbCounter').textContent=(lbIndex+1)+' / '+photos.length;
}

/* Mouse drag for pan when zoomed */
var lbWrap=document.getElementById('lbImageWrap');
lbWrap.addEventListener('mousedown',function(e){
  if(lbZoom<=1)return;
  lbDragging=true;lbStartX=e.clientX-lbPanX;lbStartY=e.clientY-lbPanY;
  e.preventDefault();
});
window.addEventListener('mousemove',function(e){
  if(!lbDragging)return;
  lbPanX=e.clientX-lbStartX;lbPanY=e.clientY-lbStartY;
  applyZoom();
});
window.addEventListener('mouseup',function(){lbDragging=false;});

/* Mouse wheel zoom */
lbWrap.addEventListener('wheel',function(e){
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  e.preventDefault();
  if(e.deltaY<0)lbZoomIn();else lbZoomOut();
},{passive:false});

document.getElementById('lightbox').addEventListener('click',function(e){if(e.target.id==='lightbox')closeLightbox();});
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft')lbPrev();
  if(e.key==='ArrowRight')lbNext();
  if(e.key==='+' || e.key==='=')lbZoomIn();
  if(e.key==='-')lbZoomOut();
  if(e.key==='0')lbResetZoom();
  if(e.key==='f' || e.key==='F')toggleFullscreen();
});

/* Theme toggle */
document.getElementById('themeToggle').addEventListener('click',function(){
  var cur=document.documentElement.getAttribute('data-theme');
  var next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('cok_theme',next);
});
</script>
</body>
</html>
